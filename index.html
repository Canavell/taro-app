<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Tarot</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background: #0d0a1e;
      color: #e8dff5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* Stars */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--d) infinite ease-in-out;
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: var(--op); }
    }

    /* Layout */
    .screen {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 24px 20px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #d4b8ff;
      text-align: center;
    }
    .subtitle {
      font-size: 13px;
      color: #9980c4;
      text-align: center;
      margin-top: -20px;
    }

    /* Deck */
    .deck-wrap {
      position: relative;
      width: 160px;
      height: 260px;
      cursor: pointer;
      perspective: 1000px;
    }
    .deck-card {
      position: absolute;
      width: 140px;
      height: 240px;
      border-radius: 14px;
      background: linear-gradient(145deg, #2a1a5e, #1a0f3a);
      border: 1.5px solid #5b3d9c55;
      box-shadow: 0 8px 32px #00000066;
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
    }
    .deck-card:nth-child(1) { transform: translate(10px, 10px) rotate(3deg); }
    .deck-card:nth-child(2) { transform: translate(5px, 5px) rotate(1.5deg); }
    .deck-card:nth-child(3) { transform: translate(0, 0) rotate(0deg); }

    .deck-card-face {
      width: 100%;
      height: 100%;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(145deg, #2a1a5e, #1a0f3a);
    }
    .deck-symbol {
      font-size: 52px;
      filter: drop-shadow(0 0 12px #a374ff88);
    }
    .deck-label {
      font-size: 11px;
      color: #7b5bc4;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* Orb pulse behind deck */
    .orb {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, #6c2bd944 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: orbPulse 3s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes orbPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }

    .deck-wrap:active .deck-card:nth-child(3) { transform: translateY(-8px) rotate(0deg); }

    /* Spread options */
    .spreads {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .spread-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      border-radius: 16px;
      border: 1.5px solid #3d2570;
      background: linear-gradient(135deg, #1a1038 0%, #120d2e 100%);
      color: #e8dff5;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s ease;
      text-align: left;
      position: relative;
      overflow: hidden;
    }
    .spread-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: #a374ff11;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .spread-btn:active::after { opacity: 1; }
    .spread-btn:hover {
      border-color: #7b4fd4;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px #6c2bd922;
    }
    .spread-btn:active { transform: translateY(0); }

    .spread-icon {
      font-size: 28px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 6px #a374ff66);
    }
    .spread-info { flex: 1; }
    .spread-name { font-size: 15px; font-weight: 600; color: #d4b8ff; }
    .spread-desc { font-size: 12px; color: #7b5bc4; margin-top: 2px; }
    .spread-price {
      font-size: 12px;
      color: #a374ff;
      font-weight: 600;
      background: #a374ff18;
      padding: 3px 8px;
      border-radius: 20px;
    }

    /* Shuffle animation */
    .shuffling .deck-card:nth-child(3) {
      animation: shuffle 0.6s ease-in-out;
    }
    @keyframes shuffle {
      0% { transform: translate(0,0) rotate(0deg); }
      30% { transform: translate(-30px, -10px) rotate(-15deg); }
      60% { transform: translate(30px, -5px) rotate(10deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }

    /* Selected state */
    .spread-btn.selected {
      border-color: #a374ff;
      background: linear-gradient(135deg, #2a1a5e 0%, #1a1038 100%);
      box-shadow: 0 0 0 3px #a374ff33;
    }

    /* Hint */
    .hint {
      font-size: 12px;
      color: #5a4480;
      text-align: center;
    }

    /* Main button override */
    .tg-btn-placeholder { height: 60px; }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="screen">
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:8px;">
    <h1>🔮 Расклад</h1>
    <p class="subtitle">Выберите тип расклада</p>
  </div>

  <div style="position:relative;display:flex;align-items:center;justify-content:center;">
    <div class="orb"></div>
    <div class="deck-wrap" id="deck" onclick="shuffleDeck()">
      <div class="deck-card"><div class="deck-card-face"><span class="deck-symbol">✦</span></div></div>
      <div class="deck-card"><div class="deck-card-face"><span class="deck-symbol">✦</span></div></div>
      <div class="deck-card">
        <div class="deck-card-face">
          <span class="deck-symbol">🔮</span>
          <span class="deck-label">Нажмите</span>
        </div>
      </div>
    </div>
  </div>

  <div class="spreads" id="spreads">
    <button class="spread-btn" onclick="selectSpread('daily_card')">
      <span class="spread-icon">🃏</span>
      <div class="spread-info">
        <div class="spread-name">Карта дня</div>
        <div class="spread-desc">Послание на сегодня</div>
      </div>
      <span class="spread-price">бесплатно</span>
    </button>

    <button class="spread-btn" onclick="selectSpread('spread_3')">
      <span class="spread-icon">🔮</span>
      <div class="spread-info">
        <div class="spread-name">3 карты</div>
        <div class="spread-desc">Прошлое · Настоящее · Будущее</div>
      </div>
      <span class="spread-price">150 ⭐</span>
    </button>

    <button class="spread-btn" onclick="selectSpread('spread_celtic')">
      <span class="spread-icon">✝️</span>
      <div class="spread-info">
        <div class="spread-name">Кельтский крест</div>
        <div class="spread-desc">Глубокий анализ ситуации</div>
      </div>
      <span class="spread-price">350 ⭐</span>
    </button>

    <button class="spread-btn" onclick="selectSpread('spread_compatibility')">
      <span class="spread-icon">❤️</span>
      <div class="spread-info">
        <div class="spread-name">Совместимость</div>
        <div class="spread-desc">Расклад на двоих</div>
      </div>
      <span class="spread-price">200 ⭐</span>
    </button>
  </div>

  <p class="hint">Нажмите на колоду, чтобы перемешать</p>
  <div class="tg-btn-placeholder"></div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  // Apply Telegram theme if available
  if (tg.colorScheme === 'light') {
    document.body.style.background = '#f0eaff';
    document.body.style.color = '#1a0f3a';
  }

  // Generate stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --d:${(Math.random()*4+2).toFixed(1)}s;
      --op:${(Math.random()*0.7+0.2).toFixed(2)};
      animation-delay:${(Math.random()*5).toFixed(1)}s;
    `;
    starsEl.appendChild(s);
  }

  let selected = null;

  function shuffleDeck() {
    const deck = document.getElementById('deck');
    deck.classList.remove('shuffling');
    void deck.offsetWidth; // reflow
    deck.classList.add('shuffling');
    setTimeout(() => deck.classList.remove('shuffling'), 700);
  }

  function selectSpread(action) {
    selected = action;

    // Highlight selected
    document.querySelectorAll('.spread-btn').forEach(b => b.classList.remove('selected'));
    event.currentTarget.classList.add('selected');

    // Animate deck
    shuffleDeck();

    // Show main button
    tg.MainButton.setText('✨ Начать расклад');
    tg.MainButton.color = '#7b4fd4';
    tg.MainButton.show();
  }

  tg.MainButton.onClick(() => {
    if (!selected) return;
    tg.MainButton.showProgress(true);
    tg.sendData(selected);
  });

  // If no Telegram context (browser preview)
  if (!tg.initData) {
    tg.MainButton.hide();
    console.log('Running outside Telegram');
  }
</script>
</body>
</html>
